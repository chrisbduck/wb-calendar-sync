<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Calendar Sync</title>
		<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
	</head>
	<body>
		<header>
			<a class="brand" href="{{ url_for('main.index') }}">Calendar Sync</a>
			<nav>
				<a href="{{ url_for('main.setup') }}">Setup</a>
				<a href="{{ url_for('main.sync_runs') }}">Logs</a>
				<a href="{{ url_for('main.conflicts') }}">Conflicts</a>
				{% if user %}<a href="{{ url_for('main.logout') }}">Sign out</a>{% endif %}
			</nav>
		</header>
		<main>
			{% with messages = get_flashed_messages() %}
				{% if messages %}
					<div class="messages">{% for message in messages %}<p>{{ message }}</p>{% endfor %}</div>
				{% endif %}
			{% endwith %}
			{% block content %}{% endblock %}
		</main>
	</body>
</html>
